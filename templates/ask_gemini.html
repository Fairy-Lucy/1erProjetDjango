<!DOCTYPE html>
<html>
<head>
    <title>Reconnaissance de plans - Gemini</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        img { max-width: 100%; border: 2px solid #ddd; border-radius: 8px; margin: 15px 0; }
        textarea, input[type="file"] { width: 100%; max-width: 700px; }
    </style>
</head>
<body>

    <h1>Analyse de plan</h1>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        <p><strong>Question (optionnelle) :</strong></p>
        <textarea name="question" rows="4" cols="80" placeholder="Posez une question en plus de l'analyse de base">{{ question }}</textarea>

        <p><strong>Upload du plan (image) :</strong></p>
        <input type="file" name="plan_image" accept="image/*" style="margin-bottom: 20px;">

        <br>
        <button type="submit">Analyser avec Gemini</button>
    </form>

    {% if uploaded_image %}
        <h2>Plan uploadé :</h2>
        <img src="{{ uploaded_image }}" alt="Plan uploadé">
    {% endif %}

    {% if response_text %}
        <h2>Réponse de Gemini :</h2>
        <p style="white-space: pre-wrap; line-height: 1.6;">{{ response_text }}</p>
    {% endif %}

</body>
</html>
